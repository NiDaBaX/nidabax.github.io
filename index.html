<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiDaBaX | TorBox Setup Guide</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: #161b22;
            padding: 35px 25px;
            border-radius: 16px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .profile-img {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: linear-gradient(135deg, #238636, #2ea44f);
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
        }
        h1 {
            color: #f0f6fc;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .bio {
            color: #8b949e;
            font-size: 14px;
            line-height: 1.5;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #238636;
            color: #ffffff;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.05);
            margin: 20px 0;
            box-shadow: 0 4px 12px rgba(46, 164, 79, 0.2);
            cursor: pointer;
        }
        .btn:hover {
            background-color: #2ea44f;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(46, 164, 79, 0.4);
        }
        .guide-content {
            text-align: left;
            border-top: 1px solid #30363d;
            padding-top: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        h2 {
            color: #f0f6fc;
            font-size: 16px;
            margin: 25px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-box {
            background-color: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.4);
            color: #ff7b72;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .copy-container {
            display: flex;
            align-items: center;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin: 10px 0;
            overflow: hidden;
        }
        .code-block {
            padding: 12px 15px;
            font-family: monospace;
            color: #58a6ff;
            font-size: 13px;
            flex-grow: 1;
            word-break: break-all;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .copy-btn {
            background: #21262d;
            color: #c9d1d9;
            border: none;
            border-left: 1px solid #30363d;
            padding: 12px 18px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 80px;
        }
        .copy-btn:hover {
            background: #30363d;
            color: #f0f6fc;
        }
        .copy-btn.copied {
            background: #238636;
            color: white;
        }
        ul, ol {
            padding-left: 20px;
            margin-bottom: 15px;
        }
        li {
            margin-bottom: 6px;
        }
        .highlight-days {
            color: #58a6ff;
            font-weight: bold;
        }

        /* FAQ СТИЛОВЕ */
        .faq-section {
            border-top: 1px solid #30363d;
            margin-top: 30px;
            padding-top: 15px;
        }
        .faq-item {
            border-bottom: 1px solid #21262d;
            padding: 12px 0;
        }
        .faq-question {
            font-weight: 600;
            color: #c9d1d9;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            font-size: 14px;
        }
        .faq-question:hover {
            color: #f0f6fc;
        }
        .faq-question::after {
            content: '＋';
            font-size: 14px;
            color: #8b949e;
            transition: transform 0.2s ease;
        }
        .faq-item.active .faq-question::after {
            content: '－';
            color: #58a6ff;
        }
        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s ease-out;
            color: #8b949e;
            font-size: 13.5px;
            line-height: 1.5;
        }
        .faq-answer p {
            padding-top: 10px;
        }
    </style>
</head>
